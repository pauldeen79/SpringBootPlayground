---
# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write # needed to post the dependency snapshot

jobs:
  build:

    runs-on: ubuntu-latest

    # temporary work-around to force nodejs 20 to nodejs 24
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0 # Shallow clones must be disabled for a better relevancy of analysis
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    - name: Cache SonarCloud packages
      uses: actions/cache@v4
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar
    - name: Build with Maven
      env:
        # GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Required to pull PR metadata
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}   # Your secure SonarCloud token
      run: |
        mvn -B package --file pom.xml org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
          -Dsonar.organization=pauldeen79 \
          -Dsonar.projectKey=SpringBootPlayground \
          -Dsonar.host.url=https://sonarcloud.io
    # Upload the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@b275d12641ac2d2108b2cbb7598b154ad2f2cee8 # v5.7.0
      with:
        ignore-maven-wrapper: true
